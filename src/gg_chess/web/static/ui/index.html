<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>gg-chess — Game review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }

    :root {
      /* Dark (default) — Monokai Classic */
      --bg:           #272822;
      --bg-2:         #1e1f1a;
      --surface:      #2d2e27;
      --surface-2:    #353630;
      --surface-3:    #3e3d32;
      --border:       #3e3d32;
      --border-2:     #49483e;
      --text:         #f8f8f2;
      --text-muted:   #cfcfc2;
      --text-dim:     #75715e;
      --accent:       #a6e22e;          /* Monokai green (functions) */
      --accent-2:     #c9f05c;
      --accent-muted: rgba(166,226,46,0.14);
      --accent-dim:   #7fa822;

      --warn:         #fd971f;          /* Monokai orange (params) */
      --warn-muted:   rgba(253,151,31,0.15);
      --danger:       #f92672;          /* Monokai pink (keywords) */
      --danger-muted: rgba(249,38,114,0.15);
      --info:         #66d9ef;          /* Monokai cyan (types) */
      --info-muted:   rgba(102,217,239,0.14);
      --purple:       #ae81ff;          /* Monokai purple (numbers) */
      --yellow:       #e6db74;          /* Monokai yellow (strings) */

      --square-dark:  #3e3d32;
      --square-light: #d8d4c0;

      --font-ui:    'DM Sans', system-ui, sans-serif;
      --font-serif: 'Instrument Serif', 'Iowan Old Style', Georgia, serif;
      --font-mono:  'JetBrains Mono', ui-monospace, monospace;

      --radius-sm: 4px;
      --radius:    6px;
      --radius-lg: 10px;

      --shadow-1: 0 1px 2px rgba(0,0,0,0.25);
      --shadow-2: 0 4px 16px rgba(0,0,0,0.35);
    }

    body.theme-light {
      /* Monokai Light (rare but real) */
      --bg:           #fafafa;
      --bg-2:         #efefef;
      --surface:      #ffffff;
      --surface-2:    #f2f2f2;
      --surface-3:    #e6e6e6;
      --border:       #e0e0dc;
      --border-2:     #c9c9c1;
      --text:         #272822;
      --text-muted:   #555449;
      --text-dim:     #9b9a8a;
      --accent:       #5e8b00;
      --accent-2:     #7cad1a;
      --accent-muted: rgba(94,139,0,0.12);
      --accent-dim:   #8db04f;
      --warn:         #ca7a00;
      --warn-muted:   rgba(202,122,0,0.13);
      --danger:       #d12b6b;
      --danger-muted: rgba(209,43,107,0.12);
      --info:         #0e8aa2;
      --info-muted:   rgba(14,138,162,0.12);
      --purple:       #7f5fd0;
      --yellow:       #a88c1a;
      --square-dark:  #c3b787;
      --square-light: #ebe4c8;
    }

    body.theme-editorial {
      /* Monokai Machine — cooler, deeper */
      --bg:           #1c1e1f;
      --bg-2:         #161818;
      --surface:      #24272a;
      --surface-2:    #2d3034;
      --surface-3:    #363a3f;
      --border:       #363a3f;
      --border-2:     #454a50;
      --text:         #f2fffc;
      --text-muted:   #c5ceca;
      --text-dim:     #696f71;
      --accent:       #7bd88f;
      --accent-2:     #9feba2;
      --accent-muted: rgba(123,216,143,0.14);
      --accent-dim:   #5ca16d;
      --warn:         #ffa14a;
      --warn-muted:   rgba(255,161,74,0.14);
      --danger:       #ff6d7e;
      --danger-muted: rgba(255,109,126,0.14);
      --info:         #5ad4e6;
      --info-muted:   rgba(90,212,230,0.14);
      --purple:       #948ae3;
      --yellow:       #ffd866;
      --square-dark:  #3a3e3f;
      --square-light: #cec6b4;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    * { scrollbar-width: thin; scrollbar-color: #3a3e42 transparent; }
    *::-webkit-scrollbar { width: 8px; height: 8px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb { background: #3a3e42; border-radius: 99px; }
    *::-webkit-scrollbar-thumb:hover { background: #50555a; }

    button { font: inherit; color: inherit; }

    /* Utility: subtle entrance */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: none; }
    }
    .fade-up { animation: fadeUp 0.35s ease-out both; }
  </style>
</head>
<body>
  <div id="app"></div>

  <!-- React -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- App -->
  <script type="text/babel" src="src/data.jsx"></script>
  <script type="text/babel" src="src/chess-utils.jsx"></script>
  <script type="text/babel" src="src/board.jsx"></script>
  <script type="text/babel" src="src/evalgraph.jsx"></script>
  <script type="text/babel" src="src/gamelist.jsx"></script>
  <script type="text/babel" src="src/movelist.jsx"></script>
  <script type="text/babel" src="src/coach.jsx"></script>
  <script type="text/babel" src="src/tweaks.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
